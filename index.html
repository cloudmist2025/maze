<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winston 的云端迷宫竞技场</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-color: #2ecc71; --accent-color: #00bfff; }
        body { background-color: #0a0a0a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .header { position: absolute; top: 20px; text-align: center; pointer-events: none; }
        .timer-box { font-size: 32px; color: #f1c40f; text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
        
        #game-container { position: relative; border: 4px solid #333; border-radius: 8px; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        canvas { display: block; background-color: #111; }

        /* 排行榜样式 */
        #leaderboard { position: absolute; left: calc(100% + 20px); top: 0; background: rgba(20, 20, 20, 0.9); padding: 15px; border: 1px solid #444; border-radius: 10px; width: 220px; transition: 0.3s; }
        h3 { margin-top: 0; color: var(--primary-color); border-bottom: 1px solid #444; padding-bottom: 5px; }
        ol { padding-left: 25px; font-size: 14px; color: #ccc; }
        li { margin-bottom: 8px; }
        li span { float: right; color: var(--accent-color); }

        /* 胜利弹窗 */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .modal { background: #222; padding: 40px; border-radius: 20px; border: 2px solid var(--primary-color); text-align: center; }
        button { background: var(--primary-color); color: white; border: none; padding: 12px 30px; border-radius: 25px; font-size: 18px; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        button:hover { transform: scale(1.05); filter: brightness(1.1); }
        
        @media (max-width: 1000px) { #leaderboard { position: static; margin-top: 20px; width: 80%; } }
    </style>
</head>
<body>

    <div class="header">
        <div class="timer-box">⏱ <span id="timerDisplay">0.00</span>s</div>
        <div style="color: #888;">找到红色出口 | 成绩将自动同步云端</div>
    </div>

    <div id="game-container">
        <canvas id="mazeCanvas"></canvas>
        <div id="leaderboard">
            <h3>🏆 全班英雄榜</h3>
            <ol id="rankList"><li>加载中...</li></ol>
        </div>
    </div>

    <div id="winOverlay" class="overlay">
        <div class="modal">
            <h1 style="color: var(--primary-color)">挑战成功！</h1>
            <p id="resultText" style="font-size: 20px"></p>
            <button onclick="location.reload()">再来一局</button>
        </div>
    </div>

<script>
    // ==========================================
    // 1. 配置中心 (请在此填入你的 Supabase 信息)
    // ==========================================
    const SUPABASE_URL = 'https://csjtxwvpqzcdsgukilna.supabase.co'; 
    const SUPABASE_KEY = 'YOUR_ANON_KEYeyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNzanR4d3ZwcXpjZHNndWtpbG5hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMTI5MTcsImV4cCI6MjA4NzU4ODkxN30.mMV1MJezAssQRlWPwkgNEDrAvNGgQbd5cfQ_n2LJC-o';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ==========================================
    // 2. 游戏核心设置
    // ==========================================
    const canvas = document.getElementById('mazeCanvas');
    const ctx = canvas.getContext('2d');
    const TILE_SIZE = 22; 
    const COLS = 31; // 必须奇数
    const ROWS = 25; // 必须奇数
    const VISION = 90; // 视野范围（像素）

    canvas.width = COLS * TILE_SIZE;
    canvas.height = ROWS * TILE_SIZE;

    let maze = [];
    let player = { x: 1, y: 1 };
    const startPos = { x: 1, y: 1 };
    const exitPos = { x: COLS - 2, y: ROWS - 2 };

    let startTime = null;
    let timerInterval = null;
    let isFinished = false;

    // --- 迷宫生成 (DFS) ---
    function initMaze() {
        for (let y = 0; y < ROWS; y++) maze[y] = new Array(COLS).fill(1);
        function carve(x, y) {
            maze[y][x] = 0;
            const dirs = [[0,2],[0,-2],[2,0],[-2,0]].sort(()=>Math.random()-0.5);
            for(let [dx, dy] of dirs) {
                let nx = x + dx, ny = y + dy;
                if(nx > 0 && nx < COLS-1 && ny > 0 && ny < ROWS-1 && maze[ny][nx] === 1) {
                    maze[y + dy/2][x + dx/2] = 0;
                    carve(nx, ny);
                }
            }
        }
        carve(1, 1);
        maze[exitPos.y][exitPos.x] = 0;
        fetchCloudRank(); // 初始加载排名
    }

    // ==========================================
    // 3. 云端数据交互
    // ==========================================
    async function saveScoreToCloud(name, seconds) {
        const { error } = await supabase
            .from('leaderboard')
            .insert([{ name: name, score: parseFloat(seconds) }]);
        if (error) console.error("上传失败:", error.message);
        fetchCloudRank();
    }

    async function fetchCloudRank() {
        const { data, error } = await supabase
            .from('leaderboard')
            .select('name, score')
            .order('score', { ascending: true })
            .limit(10);
        
        if (!error && data) {
            const list = document.getElementById('rankList');
            list.innerHTML = data.map(item => 
                `<li>${item.name} <span>${item.score.toFixed(2)}s</span></li>`
            ).join('');
        }
    }

    // ==========================================
    // 4. 渲染与控制
    // ==========================================
    function draw() {
        // A. 底层：迷宫
        ctx.fillStyle = "#111";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        for (let y = 0; y < ROWS; y++) {
            for (let x = 0; x < COLS; x++) {
                if (maze[y][x] === 0) {
                    ctx.fillStyle = "#222";
                    ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                }
            }
        }

        const px = player.x * TILE_SIZE + TILE_SIZE/2;
        const py = player.y * TILE_SIZE + TILE_SIZE/2;

        // B. 战争迷雾效果
        ctx.save();
        ctx.beginPath();
        ctx.rect(0, 0, canvas.width, canvas.height);
        ctx.arc(px, py, VISION, 0, Math.PI * 2, true);
        ctx.fillStyle = "black";
        ctx.fill();
        ctx.restore();

        // C. 角色
        ctx.fillStyle = "#00bfff";
        ctx.beginPath(); ctx.arc(px, py, TILE_SIZE/3, 0, Math.PI*2); ctx.fill();

        // D. 灯塔：强行绘制入口和出口
        ctx.fillStyle = "#2ecc71"; // 起点
        ctx.fillRect(startPos.x*TILE_SIZE+4, startPos.y*TILE_SIZE+4, TILE_SIZE-8, TILE_SIZE-8);
        ctx.fillStyle = "#ff4757"; // 终点
        ctx.fillRect(exitPos.x*TILE_SIZE+4, exitPos.y*TILE_SIZE+4, TILE_SIZE-8, TILE_SIZE-8);
    }

    window.addEventListener('keydown', (e) => {
        if(isFinished) return;
        if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) {
            e.preventDefault();
            if(!startTime) {
                startTime = Date.now();
                timerInterval = setInterval(() => {
                    document.getElementById('timerDisplay').innerText = ((Date.now()-startTime)/1000).toFixed(2);
                }, 50);
            }
        }

        let nx = player.x, ny = player.y;
        if (e.key === 'ArrowUp') ny--;
        else if (e.key === 'ArrowDown') ny++;
        else if (e.key === 'ArrowLeft') nx--;
        else if (e.key === 'ArrowRight') nx++;

        if (maze[ny] && maze[ny][nx] === 0) {
            player.x = nx; player.y = ny;
            draw();
            if (player.x === exitPos.x && player.y === exitPos.y) win();
        }
    });

    async function win() {
        isFinished = true;
        clearInterval(timerInterval);
        const finalTime = document.getElementById('timerDisplay').innerText;
        document.getElementById('resultText').innerText = `你的成绩：${finalTime} 秒`;
        document.getElementById('winOverlay').style.display = 'flex';
        
        const playerName = prompt("恭喜通关！请输入你的大名上传成绩：") || "神秘玩家";
        await saveScoreToCloud(playerName, finalTime);
    }

    initMaze();
    draw();
</script>
</body>
</html>
