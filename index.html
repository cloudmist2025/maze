<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Winston 的云端迷宫 - 手机竞技版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-color: #2ecc71; --accent-color: #00bfff; }
        body { 
            background-color: #0a0a0a; color: white; font-family: sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            height: 100vh; overflow: hidden; touch-action: none; /* 禁用系统手势 */
        }
        
        .header { margin-top: 10px; text-align: center; }
        .timer-box { font-size: 24px; color: #f1c40f; }
        
        #game-container { position: relative; margin-top: 5px; }
        canvas { display: block; background-color: #111; border: 2px solid #333; border-radius: 4px; }

        /* 手机端排行榜改到下方 */
        #leaderboard { 
            background: rgba(20, 20, 20, 0.9); padding: 10px; border-radius: 8px; 
            width: 90%; max-width: 350px; margin-top: 10px; font-size: 12px;
        }
        h3 { margin: 0 0 5px 0; color: var(--primary-color); font-size: 16px; text-align: center; }
        ol { padding-left: 20px; column-count: 2; margin: 0; } /* 两列显示更省空间 */
        li span { color: var(--accent-color); margin-left: 5px; }

        /* --- 虚拟按键样式 --- */
        .controls { 
            display: grid; grid-template-areas: ". up ." "left down right"; 
            gap: 10px; margin-top: auto; margin-bottom: 20px; 
        }
        .btn { 
            width: 60px; height: 60px; background: rgba(255,255,255,0.1); 
            border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: white; -webkit-user-select: none;
        }
        .btn:active { background: var(--accent-color); transform: scale(0.9); }
        .btn-up { grid-area: up; }
        .btn-left { grid-area: left; }
        .btn-right { grid-area: right; }
        .btn-down { grid-area: down; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .modal { background: #222; padding: 30px; border-radius: 20px; border: 2px solid var(--primary-color); text-align: center; width: 80%; }
        button { background: var(--primary-color); color: white; border: none; padding: 12px 30px; border-radius: 25px; font-size: 18px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="timer-box">⏱ <span id="timerDisplay">0.00</span>s</div>
    </div>

    <div id="game-container">
        <canvas id="mazeCanvas"></canvas>
    </div>

    <div id="leaderboard">
        <h3>🏆 英雄榜</h3>
        <ol id="rankList"><li>加载中...</li></ol>
    </div>

    <div class="controls">
        <div class="btn btn-up" ontouchstart="handleBtn('up')">▲</div>
        <div class="btn btn-left" ontouchstart="handleBtn('left')">◀</div>
        <div class="btn btn-down" ontouchstart="handleBtn('down')">▼</div>
        <div class="btn btn-right" ontouchstart="handleBtn('right')">▶</div>
    </div>

    <div id="winOverlay" class="overlay">
        <div class="modal">
            <h1 style="color: var(--primary-color)">挑战成功！</h1>
            <p id="resultText"></p>
            <button onclick="location.reload()">再来一局</button>
        </div>
    </div>

<script>
    // 1. 配置中心 (请填入你的信息)
    const SB_URL = 'hhttps://csjtxwvpqzcdsgukilna.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNzanR4d3ZwcXpjZHNndWtpbG5hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMTI5MTcsImV4cCI6MjA4NzU4ODkxN30.mMV1MJezAssQRlWPwkgNEDrAvNGgQbd5cfQ_n2LJC-o';
    
    let sbClient = null;
    try { sbClient = supabase.createClient(SB_URL, SB_KEY); } catch (e) {}

    // 2. 自适应屏幕计算格子大小
    const COLS = 21, ROWS = 21; // 手机端迷宫建议稍微小一点点，或者保持 31/25
    // 根据屏幕宽度自动计算格子尺寸，预留边距
    const TILE_SIZE = Math.floor((window.innerWidth * 0.95) / COLS);
    const VISION = TILE_SIZE * 3.5; // 视野范围随格子缩放

    const canvas = document.getElementById('mazeCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = COLS * TILE_SIZE;
    canvas.height = ROWS * TILE_SIZE;

    let maze = [], player = { x: 1, y: 1 };
    const startPos = { x: 1, y: 1 }, exitPos = { x: COLS - 2, y: ROWS - 2 };
    let startTime = null, timerInterval = null, isFinished = false;

    // 3. 游戏逻辑
    function initMaze() {
        for (let y = 0; y < ROWS; y++) maze[y] = new Array(COLS).fill(1);
        function carve(x, y) {
            maze[y][x] = 0;
            const dirs = [[0,2],[0,-2],[2,0],[-2,0]].sort(()=>Math.random()-0.5);
            for(let [dx, dy] of dirs) {
                let nx = x + dx, ny = y + dy;
                if(nx > 0 && nx < COLS-1 && ny > 0 && ny < ROWS-1 && maze[ny][nx] === 1) {
                    maze[y + dy/2][x + dx/2] = 0; carve(nx, ny);
                }
            }
        }
        carve(1, 1); maze[exitPos.y][exitPos.x] = 0; fetchRank();
    }

    // 虚拟按键处理
    function handleBtn(dir) {
        if(isFinished) return;
        if(!startTime) startTimer();
        let nx = player.x, ny = player.y;
        if(dir === 'up') ny--; else if(dir === 'down') ny++;
        else if(dir === 'left') nx--; else if(dir === 'right') nx++;
        movePlayer(nx, ny);
    }

    function startTimer() {
        startTime = Date.now();
        timerInterval = setInterval(() => { 
            document.getElementById('timerDisplay').innerText = ((Date.now()-startTime)/1000).toFixed(2); 
        }, 50);
    }

    function movePlayer(nx, ny) {
        if (maze[ny] && maze[ny][nx] === 0) {
            player.x = nx; player.y = ny;
            draw();
            if (player.x === exitPos.x && player.y === exitPos.y) win();
        }
    }

    // 4. 云端交互
    async function saveScore(name, seconds) {
        if (!sbClient) return;
        await sbClient.from('leaderboard').insert([{ name, score: parseFloat(seconds) }]);
        fetchRank();
    }

    async function fetchRank() {
        if (!sbClient) return;
        const { data, error } = await sbClient.from('leaderboard').select('name, score').order('score', { ascending: true }).limit(8);
        if (!error && data) {
            document.getElementById('rankList').innerHTML = data.map(i => `<li>${i.name}<span>${i.score.toFixed(2)}s</span></li>`).join('');
        }
    }

    // 5. 渲染
    function draw() {
        ctx.fillStyle = "#111"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        for (let y = 0; y < ROWS; y++) {
            for (let x = 0; x < COLS; x++) {
                if (maze[y][x] === 0) { ctx.fillStyle = "#222"; ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE); }
            }
        }
        const px = player.x * TILE_SIZE + TILE_SIZE/2, py = player.y * TILE_SIZE + TILE_SIZE/2;
        ctx.save(); ctx.beginPath(); ctx.rect(0, 0, canvas.width, canvas.height);
        ctx.arc(px, py, VISION, 0, Math.PI * 2, true);
        ctx.fillStyle = "black"; ctx.fill(); ctx.restore();
        ctx.fillStyle = "#00bfff"; ctx.beginPath(); ctx.arc(px, py, TILE_SIZE/3, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#2ecc71"; ctx.fillRect(startPos.x*TILE_SIZE+4, startPos.y*TILE_SIZE+4, TILE_SIZE-8, TILE_SIZE-8);
        ctx.fillStyle = "#ff4757"; ctx.fillRect(exitPos.x*TILE_SIZE+4, exitPos.y*TILE_SIZE+4, TILE_SIZE-8, TILE_SIZE-8);
    }

    // 兼容电脑键盘
    window.addEventListener('keydown', (e) => {
        if(e.key.includes('Arrow')) { e.preventDefault(); handleBtn(e.key.replace('Arrow','').toLowerCase()); }
    });

    async function win() {
        isFinished = true; clearInterval(timerInterval);
        const finalTime = document.getElementById('timerDisplay').innerText;
        document.getElementById('resultText').innerText = `你的成绩：${finalTime} 秒`;
        document.getElementById('winOverlay').style.display = 'flex';
        const pName = prompt("通关成功！请输入名字：") || "匿名玩家";
        await saveScore(pName, finalTime);
    }

    initMaze(); draw();
</script>
</body>
</html>
